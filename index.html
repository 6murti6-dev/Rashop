<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Echo AI</title>
    <style>
        /* Desain Bersih & Modern */
        :root {
            --bg-main: #09090b;      /* Hitam pekat */
            --bg-surface: #18181b;   /* Abu-abu gelap untuk container */
            --primary: #3b82f6;      /* Biru modern */
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --border: #27272a;
        }

        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            margin: 0;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            height: 100vh;
        }

        /* Container menyerupai layar HP */
        .app-container {
            width: 100%;
            max-width: 480px;
            background-color: var(--bg-surface);
            display: flex;
            flex-direction: column;
            height: 100%;
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
        }

        /* Header UI */
        header {
            padding: 20px;
            text-align: center;
            font-size: 1.25rem;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            background-color: var(--bg-surface);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Efek Glow 1: Indikator Online */
        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981; /* Glow khusus di sini */
        }

        /* Area Chatting */
        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Desain Gelembung Chat (Flat, Tanpa Glow) */
        .msg-wrapper { display: flex; width: 100%; }
        .msg-wrapper.user { justify-content: flex-end; }
        .msg-wrapper.ai { justify-content: flex-start; }

        .msg {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.5;
            font-size: 0.95rem;
            word-wrap: break-word;
        }

        .msg-wrapper.user .msg {
            background-color: var(--primary);
            color: white;
            border-bottom-right-radius: 4px; /* Sudut tajam khas chat */
        }

        .msg-wrapper.ai .msg {
            background-color: #27272a;
            color: var(--text-main);
            border-bottom-left-radius: 4px;
        }

        /* Area Input */
        .input-area {
            padding: 16px;
            background-color: var(--bg-surface);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }

        input {
            flex: 1;
            background-color: var(--bg-main);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary);
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* Efek Glow 2: Hover pada tombol kirim */
        button:hover, button:active {
            background-color: #2563eb;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.6); /* Glow saat ditekan */
        }

        button:disabled {
            background-color: var(--border);
            color: var(--text-muted);
            box-shadow: none;
            cursor: not-allowed;
        }

        .typing {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        Echo AI <div class="status-dot"></div>
    </header>

    <div class="chat-box" id="chat-box">
        <div class="msg-wrapper ai">
            <div class="msg">Halo! Saya Echo AI. Ada yang bisa saya bantu hari ini?</div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Tanyakan sesuatu..." onkeypress="handleKeyPress(event)">
        <button id="send-btn" onclick="sendMessage()">Kirim</button>
    </div>
</div>

<script>
    // Konfigurasi API
    const API_KEY = "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";
    // Menggunakan model Mistral Instruct yang sangat bagus untuk tanya jawab
    const API_URL = "https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.2";

    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    function handleKeyPress(e) {
        if (e.key === 'Enter') sendMessage();
    }

    function appendMessage(sender, text) {
        const wrapper = document.createElement('div');
        wrapper.className = `msg-wrapper ${sender}`;
        
        const msgDiv = document.createElement('div');
        msgDiv.className = 'msg';
        
        // Membersihkan format teks (menjaga baris baru)
        msgDiv.innerHTML = text.replace(/\n/g, '<br>');
        
        wrapper.appendChild(msgDiv);
        chatBox.appendChild(wrapper);
        
        // Scroll otomatis ke bawah
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        // 1. Tampilkan pesan user
        appendMessage('user', text);
        userInput.value = '';
        
        // Disable input saat AI berpikir
        userInput.disabled = true;
        sendBtn.disabled = true;

        // Tampilkan indikator mengetik
        const typingId = "typing-" + Date.now();
        const typingDiv = document.createElement('div');
        typingDiv.className = 'msg-wrapper ai';
        typingDiv.id = typingId;
        typingDiv.innerHTML = `<div class="msg typing">Echo AI sedang memikirkan jawaban...</div>`;
        chatBox.appendChild(typingDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            // Format prompt agar AI merespons sebagai asisten (Sintaks Mistral)
            const prompt = `[INST] You are a helpful, smart assistant named Echo AI. Answer concisely. User says: ${text} [/INST]`;

            // 2. Kirim ke Hugging Face API
            const response = await fetch(API_URL, {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ 
                    inputs: prompt,
                    parameters: {
                        max_new_tokens: 250,
                        temperature: 0.7,
                        return_full_text: false // Hanya kembalikan jawabannya saja
                    }
                }),
            });

            const result = await response.json();
            
            // Hapus indikator mengetik
            document.getElementById(typingId).remove();

            // 3. Tangkap dan tampilkan respons
            if (response.ok && result && result[0]) {
                let aiResponse = result[0].generated_text.trim();
                appendMessage('ai', aiResponse);
            } else if (result.error && result.error.includes("loading")) {
                appendMessage('ai', "⚠️ *Sistem AI sedang bersiap (Loading model). Mohon tunggu sekitar 20 detik dan coba tanyakan lagi.*");
            } else {
                appendMessage('ai', "Maaf, terjadi kesalahan pada server. Coba lagi nanti.");
                console.log(result);
            }

        } catch (error) {
            document.getElementById(typingId).remove();
            appendMessage('ai', "Gagal terhubung ke internet atau server AI.");
            console.error(error);
        } finally {
            // Aktifkan kembali input
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }
    }
</script>

</body>
</html>
